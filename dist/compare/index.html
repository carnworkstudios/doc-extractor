  <script>self["MonacoEnvironment"] = (function (paths) {
          return {
            globalAPI: false,
            getWorkerUrl : function (moduleId, label) {
              var result =  paths[label];
              if (/^((http:)|(https:)|(file:)|(\/\/))/.test(result)) {
                var currentUrl = String(window.location);
                var currentOrigin = currentUrl.substr(0, currentUrl.length - window.location.hash.length - window.location.search.length - window.location.pathname.length);
                if (result.substring(0, currentOrigin.length) !== currentOrigin) {
                  var js = '/*' + label + '*/importScripts("' + result + '");';
                  var blob = new Blob([js], { type: 'application/javascript' });
                  return URL.createObjectURL(blob);
                }
              }
              return result;
            }
          };
        })({

    <script>
    // Mode routing — path-based activation + URL sync on switch
    document.addEventListener('DOMContentLoaded', function () {
      var p = location.pathname;

      // On load: activate view matching the current path
      var viewMap = {
        'visual-diff': 'visual-diff',
        'compare':     'diff',
        'editor':      'editor',
      };
      var matched = Object.keys(viewMap).find(function (k) { return p.includes('/' + k + '/'); });
      if (matched) {
        var btn = document.querySelector('.tab-btn[data-view="' + viewMap[matched] + '"]');
        if (btn && !btn.disabled) btn.click();
      }

      // On switch: keep URL in sync
      var urlMap = {
        'editor':      '/tools/pdf-processor/editor/',
        'visual-diff': '/tools/pdf-processor/visual-diff/',
        'diff':        '/tools/pdf-processor/compare/',
        'pdf':         '/tools/pdf-processor/',
        'html':        '/tools/pdf-processor/',
      };
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.tab-btn');
        if (btn && urlMap[btn.dataset.view]) {
          history.replaceState({}, '', urlMap[btn.dataset.view]);
        }
      });
    });
    </script>
